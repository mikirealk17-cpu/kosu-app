<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>作業内容管理</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>作業内容管理</h1>

    <nav class="page-links" aria-label="画面移動">
      <a href="admin.html">管理画面</a>
      <a href="index.html">工数入力</a>
      <a href="summary.html">集計画面</a>
    </nav>

    <div class="form-group">
      <label>作業内容を追加</label>
      <div class="add-form">
        <input type="text" id="new_work_type_name" placeholder="例: 組付け">
        <input type="number" id="new_work_type_order" value="100" min="0" aria-label="並び順">
        <button onclick="addWorkType()">追加</button>
      </div>
    </div>

    <div id="work_type_list" class="master-list"></div>
    <div id="message"></div>
  </div>

  <script src="work-types.js" type="module"></script>
</body>
</html>
