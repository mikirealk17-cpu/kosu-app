<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>大元請け管理</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>大元請け管理</h1>

    <nav class="page-links" aria-label="画面移動">
      <a href="admin.html">管理画面</a>
      <a href="index.html">工数入力</a>
      <a href="summary.html">集計画面</a>
    </nav>

    <div class="worker-list" id="root_company_list"></div>

    <div class="form-group">
      <label>新しい大元請けを追加</label>
      <div class="add-form">
        <input type="text" id="new_root_company_name" placeholder="例: A工業">
        <input type="number" id="new_root_company_order" value="100" min="0" aria-label="並び順">
        <button onclick="addRootCompany()">追加</button>
      </div>
    </div>

    <div id="message"></div>
  </div>

  <script src="root-companies.js" type="module"></script>
</body>
</html>
