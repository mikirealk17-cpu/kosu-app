<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理画面</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>管理画面</h1>

    <nav class="page-links" aria-label="画面移動">
      <a href="index.html">工数入力</a>
      <a href="summary.html">集計画面</a>
      <a href="logs.html">履歴編集</a>
    </nav>

    <div id="admin_counts" class="admin-counts" aria-label="登録件数">
      <div class="count-card">
        <strong id="count_workers">--</strong>
        <span>作業者</span>
      </div>
      <div class="count-card">
        <strong id="count_work_types">--</strong>
        <span>作業内容</span>
      </div>
      <div class="count-card">
        <strong id="count_seibans">--</strong>
        <span>製番</span>
      </div>
      <div class="count-card">
        <strong id="count_logs">--</strong>
        <span>工数記録</span>
      </div>
    </div>
    <div id="admin_status" class="status-text"></div>

    <div class="admin-menu">
      <a href="workers.html">
        <strong>作業者管理</strong>
        <span>作業者の追加・編集・削除</span>
      </a>
      <a href="work-types.html">
        <strong>作業内容管理</strong>
        <span>作業内容の追加・編集・削除</span>
      </a>
      <a href="seibans.html">
        <strong>製番管理</strong>
        <span>製番と設備名の追加・編集・削除</span>
      </a>
    </div>
  </div>

  <script src="admin.js" type="module"></script>
</body>
</html>
