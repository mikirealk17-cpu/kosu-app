<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container app-shell">
    <header class="screen-header">
      <div>
        <p class="screen-kicker">Kosu Tracker</p>
        <h1>ログイン</h1>
      </div>
      <span class="screen-badge">権限確認</span>
    </header>

    <main class="panel auth-panel">
      <div class="panel-header">
        <div>
          <h2>工数管理アプリ</h2>
          <p>メールアドレスとパスワードでログインします。</p>
        </div>
      </div>

      <form id="login_form">
        <div class="form-group">
          <label>メールアドレス</label>
          <input type="email" id="login_email" autocomplete="email" required>
        </div>

        <div class="form-group">
          <label>パスワード</label>
          <input type="password" id="login_password" autocomplete="current-password" required>
        </div>

        <button class="primary-action" type="submit">ログイン</button>
        <button class="secondary-btn auth-logout-button is-hidden" type="button" id="logout_button">ログアウト</button>
      </form>

      <div id="message" role="status" aria-live="polite"></div>
    </main>
  </div>

  <script src="login.js" type="module"></script>
</body>
</html>
