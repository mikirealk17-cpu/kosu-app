<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>工数集計</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .tab-buttons {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }
    .tab-btn {
      flex: 1;
      padding: 10px;
      border: 2px solid #2c7be5;
      background: white;
      color: #2c7be5;
      border-radius: 8px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
    }
    .tab-btn.active {
      background: #2c7be5;
      color: white;
    }
    .period-select {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 20px;
    }
    .period-select input {
      flex: 1;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 8px;
      overflow: hidden;
    }
    th {
      background: #2c7be5;
      color: white;
      padding: 12px;
      text-align: left;
      font-size: 14px;
    }
    td {
      padding: 12px;
      border-bottom: 1px solid #eee;
      font-size: 15px;
    }
    tr:last-child td {
      border-bottom: none;
    }
    .total-row td {
      font-weight: bold;
      background: #f0f7ff;
      color: #2c7be5;
    }
    .back-btn {
      display: block;
      text-align: center;
      padding: 12px;
      background: #6c757d;
      color: white;
      border-radius: 8px;
      text-decoration: none;
      margin-bottom: 20px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📊 工数集計</h1>

    <a href="index.html" class="back-btn">← 工数入力に戻る</a>

    <div class="tab-buttons">
      <button class="tab-btn active" onclick="switchTab('seiban')">製番別</button>
      <button class="tab-btn" onclick="switchTab('equipment')">設備別</button>
      <button class="tab-btn" onclick="switchTab('daily')">日別</button>
    </div>

    <div class="period-select">
      <input type="date" id="date_from">
      <span>〜</span>
      <input type="date" id="date_to">
      <button onclick="loadData()" style="width:auto; padding: 12px 16px;">表示</button>
    </div>

    <div id="summary_table"></div>
  </div>

  <script src="summary.js" type="module"></script>
</body>
</html>
