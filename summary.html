<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>工数集計</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container dashboard-shell">
    <header class="screen-header">
      <div>
        <p class="screen-kicker">Kosu Analytics</p>
        <h1>工数集計</h1>
      </div>
      <span class="screen-badge">分析</span>
    </header>

    <nav class="page-links" aria-label="画面移動">
      <a href="index.html">工数入力</a>
      <a href="logs.html">履歴編集</a>
      <a href="admin.html">管理画面</a>
    </nav>

    <main class="panel">
      <div class="panel-header">
        <div>
          <h2>集計条件</h2>
          <p>期間と絞り込みを選ぶと、下の集計が更新されます。</p>
        </div>
      </div>

      <div class="tab-buttons" role="tablist" aria-label="集計の種類">
        <button class="tab-btn active" onclick="switchTab('seiban')">製番別</button>
        <button class="tab-btn" onclick="switchTab('seiban_detail')">製番明細</button>
        <button class="tab-btn" onclick="switchTab('equipment')">設備別</button>
        <button class="tab-btn" onclick="switchTab('daily')">日別</button>
        <button class="tab-btn" onclick="switchTab('monthly')">月別</button>
        <button class="tab-btn" onclick="switchTab('worker_daily')">作業者日別</button>
        <button class="tab-btn" onclick="switchTab('worker')">作業者別</button>
      </div>

      <div class="period-select">
        <input type="date" id="date_from" aria-label="開始日">
        <span>〜</span>
        <input type="date" id="date_to" aria-label="終了日">
        <button class="compact-action" onclick="loadData()">集計を表示</button>
      </div>
      <div class="summary-filters">
        <select id="filter_worker" onchange="loadData()">
          <option value="">全作業者</option>
        </select>
        <select id="filter_work_type" onchange="loadData()">
          <option value="">全作業内容</option>
        </select>
        <select id="filter_seiban" onchange="loadData()">
          <option value="">全製番</option>
        </select>
      </div>
      <div id="summary_status" class="status-text"></div>
    </main>

    <section id="summary_metrics" class="metric-grid" aria-label="集計の概要"></section>

    <section class="panel">
      <div class="panel-header table-header">
        <div>
          <h2>集計結果</h2>
          <p>選択中のタブに合わせて内容が変わります。</p>
        </div>
        <div class="csv-actions">
          <select id="csv_type" aria-label="CSVの種類">
            <option value="detail">明細CSV</option>
            <option value="summary">集計CSV</option>
          </select>
          <button class="secondary-btn compact-action" onclick="exportCsv()">CSV出力</button>
        </div>
      </div>

      <div id="summary_table"></div>
    </section>
  </div>

  <script src="summary.js" type="module"></script>
</body>
</html>
