<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>工数管理アプリ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container app-shell">
    <header class="screen-header">
      <div>
        <p class="screen-kicker">Kosu Tracker</p>
        <h1>工数入力</h1>
      </div>
      <span class="screen-badge">入力優先</span>
    </header>

    <nav class="page-links" aria-label="画面移動">
      <a href="summary.html">集計画面</a>
      <a href="logs.html">履歴編集</a>
      <a href="admin.html">管理画面</a>
    </nav>

    <main class="panel entry-panel">
      <div class="panel-header">
        <div>
          <h2>今日の作業</h2>
          <p>作業者、製番、時間を上から順に入力します。</p>
        </div>
      </div>

      <div class="field-grid two-columns">
        <div class="form-group">
          <label>作業者</label>
          <select id="worker"></select>
        </div>
        <div class="form-group">
          <label>日付</label>
          <input type="date" id="work_date">
        </div>
      </div>

      <div class="field-grid two-columns">
        <div class="form-group">
          <label>大元請け</label>
          <select id="root_company"></select>
        </div>

        <div class="form-group">
          <label>元請け</label>
          <select id="billing_company"></select>
        </div>
      </div>

      <div class="form-group">
        <label>単価区分</label>
        <select id="rate_type"></select>
      </div>

      <div class="form-group">
        <label>製番</label>
        <input type="text" id="seiban" placeholder="例: A001" oninput="searchSeiban()">
        <span id="seiban_status"></span>
      </div>

      <div class="form-group">
        <label>設備名</label>
        <input type="text" id="equipment_name" placeholder="製番を入力すると自動表示">
      </div>

      <div class="form-group">
        <label>作業内容</label>
        <select id="work_type"></select>
      </div>

      <div class="field-grid two-columns time-input-grid">
        <div class="form-group">
          <label>開始時間</label>
          <input type="text" id="start_time" inputmode="numeric" pattern="[0-9]*" placeholder="例: 8 / 0800">
        </div>

        <div class="form-group">
          <label>終了時間</label>
          <input type="text" id="end_time" inputmode="numeric" pattern="[0-9]*" placeholder="例: 17 / 1730">
        </div>
      </div>

      <div class="field-grid two-columns time-input-grid">
        <div class="form-group">
          <label>休憩① (分)</label>
          <input type="text" id="break1" inputmode="numeric" pattern="[0-9]*" placeholder="例: 60">
        </div>

        <div class="form-group">
          <label>休憩② (分)</label>
          <input type="text" id="break2" inputmode="numeric" pattern="[0-9]*" placeholder="例: 0">
        </div>
      </div>

      <div class="form-group">
        <label>実働時間</label>
        <div id="actual_time" class="actual-time">--時間--分</div>
      </div>

      <div class="form-group">
        <label>備考</label>
        <textarea id="note" rows="3" placeholder="任意"></textarea>
      </div>

      <button class="primary-action" onclick="saveLog()">保存する</button>
      <div id="message"></div>
    </main>
  </div>

  <script src="app.js" type="module"></script>
</body>
</html>
