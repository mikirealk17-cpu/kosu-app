<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>工数管理アプリ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>⚙️ 工数入力</h1>

    <div class="form-group">
      <label>日付</label>
      <input type="date" id="work_date">
    </div>

    <div class="form-group">
      <label>製番</label>
      <input type="text" id="seiban" placeholder="例: A001" oninput="searchSeiban()">
      <span id="seiban_status"></span>
    </div>

    <div class="form-group">
      <label>設備名</label>
      <input type="text" id="equipment_name" placeholder="製番を入力すると自動表示">
    </div>

    <div class="form-group">
      <label>作業内容</label>
      <select id="work_type"></select>
    </div>

    <div class="form-group">
      <label>開始時間</label>
      <input type="time" id="start_time">
    </div>

    <div class="form-group">
      <label>終了時間</label>
      <input type="time" id="end_time">
    </div>

    <div class="form-group">
      <label>休憩① (分)</label>
      <input type="number" id="break1" value="0" min="0">
    </div>

    <div class="form-group">
      <label>休憩② (分)</label>
      <input type="number" id="break2" value="0" min="0">
    </div>

    <div class="form-group">
      <label>実働時間</label>
      <div id="actual_time" class="actual-time">--時間--分</div>
    </div>

    <div class="form-group">
      <label>備考</label>
      <textarea id="note" rows="3" placeholder="任意"></textarea>
    </div>

    <button onclick="saveLog()"><a href="summary.html" style="display:block; text-align:center; padding:14px; background:#28a745; color:white; border-radius:8px; text-decoration:none; font-size:18px; font-weight:bold; margin-bottom:8px;">📊 集計画面へ</a>💾 保存する</button>
    <div id="message"></div>
  </div>

  <script src="app.js" type="module"></script>
</body>
</html>
