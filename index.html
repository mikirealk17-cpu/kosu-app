<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>工数管理アプリ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>工数入力</h1>

    <nav class="page-links" aria-label="画面移動">
      <a href="summary.html">集計画面</a>
      <a href="logs.html">履歴編集</a>
      <a href="admin.html">管理画面</a>
    </nav>

    <div class="form-group">
      <label>日付</label>
      <input type="date" id="work_date">
    </div>

    <div class="form-group">
      <label>作業者</label>
      <select id="worker"></select>
    </div>
    <div class="form-group">
      <label>製番</label>
      <input type="text" id="seiban" placeholder="例: A001" oninput="searchSeiban()">
      <span id="seiban_status"></span>
    </div>

    <div class="form-group">
      <label>設備名</label>
      <input type="text" id="equipment_name" placeholder="製番を入力すると自動表示">
    </div>

    <div class="form-group">
      <label>作業内容</label>
      <select id="work_type"></select>
    </div>

    <div class="form-group">
      <label>開始時間</label>
      <input type="time" id="start_time">
      <div class="quick-buttons" aria-label="開始時間の入力補助">
        <button type="button" onclick="setTimeValue('start_time', '08:00')">8:00</button>
        <button type="button" onclick="setTimeValue('start_time', '08:30')">8:30</button>
        <button type="button" onclick="setTimeValue('start_time', '09:00')">9:00</button>
        <button type="button" onclick="setTimeValue('start_time', '13:00')">13:00</button>
      </div>
    </div>

    <div class="form-group">
      <label>終了時間</label>
      <input type="time" id="end_time">
      <div class="quick-buttons" aria-label="終了時間の入力補助">
        <button type="button" onclick="setTimeValue('end_time', '12:00')">12:00</button>
        <button type="button" onclick="setTimeValue('end_time', '15:00')">15:00</button>
        <button type="button" onclick="setTimeValue('end_time', '17:00')">17:00</button>
        <button type="button" onclick="setTimeValue('end_time', '17:30')">17:30</button>
        <button type="button" onclick="setTimeValue('end_time', '18:00')">18:00</button>
        <button type="button" onclick="setTimeValue('end_time', '20:00')">20:00</button>
      </div>
    </div>

    <div class="form-group">
      <label>休憩① (分)</label>
      <input type="number" id="break1" value="0" min="0">
      <div class="quick-buttons" aria-label="休憩1の入力補助">
        <button type="button" onclick="setBreakMinutes('break1', 0)">0分</button>
        <button type="button" onclick="setBreakMinutes('break1', 10)">10分</button>
        <button type="button" onclick="setBreakMinutes('break1', 15)">15分</button>
        <button type="button" onclick="setBreakMinutes('break1', 30)">30分</button>
        <button type="button" onclick="setBreakMinutes('break1', 45)">45分</button>
        <button type="button" onclick="setBreakMinutes('break1', 60)">60分</button>
      </div>
    </div>

    <div class="form-group">
      <label>休憩② (分)</label>
      <input type="number" id="break2" value="0" min="0">
      <div class="quick-buttons" aria-label="休憩2の入力補助">
        <button type="button" onclick="setBreakMinutes('break2', 0)">0分</button>
        <button type="button" onclick="setBreakMinutes('break2', 10)">10分</button>
        <button type="button" onclick="setBreakMinutes('break2', 15)">15分</button>
        <button type="button" onclick="setBreakMinutes('break2', 30)">30分</button>
        <button type="button" onclick="setBreakMinutes('break2', 45)">45分</button>
        <button type="button" onclick="setBreakMinutes('break2', 60)">60分</button>
      </div>
    </div>

    <div class="form-group">
      <label>実働時間</label>
      <div id="actual_time" class="actual-time">--時間--分</div>
    </div>

    <div class="form-group">
      <label>備考</label>
      <textarea id="note" rows="3" placeholder="任意"></textarea>
    </div>

    <button onclick="saveLog()">保存する</button>
    <div id="message"></div>
  </div>

  <script src="app.js" type="module"></script>
</body>
</html>
